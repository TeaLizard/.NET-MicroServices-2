version: '3.8'

services:
  product-service:
    build: ./ProductService
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    volumes:
      - product-data:/app

  order-service:
    build: ./OrderService
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ProductService__BaseUrl=http://product-service:8080
    depends_on:
      - product-service
    volumes:
      - order-data:/app

volumes:
  product-data:
  order-data: